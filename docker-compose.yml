services:

  postgres:
    image: postgres:16
    container_name: home-library-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: library
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d library"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    container_name: home-library-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./src
      dockerfile: HomeLibrary.Api/Dockerfile
    container_name: home-library-api
    ports:
      - "5000:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=library;Username=postgres;Password=postgres
      RabbitMq__HostName: rabbitmq
      RabbitMq__UserName: guest
      RabbitMq__Password: guest
      RabbitMq__QueueName: book-imports

  worker:
    build:
      context: ./src
      dockerfile: HomeLibrary.Worker/Dockerfile
    container_name: home-library-worker
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=library;Username=postgres;Password=postgres
      RabbitMq__HostName: rabbitmq
      RabbitMq__UserName: guest
      RabbitMq__Password: guest
      RabbitMq__QueueName: book-imports

  web:
    build:
      context: ./src/web
    container_name: home-library-web
    ports:
      - "4200:80"
    depends_on:
      api:
        condition: service_started