<div class="min-h-screen bg-slate-950 px-6 py-8 text-white">
  <div class="mx-auto max-w-4xl">
    <a routerLink="/books" class="text-sm text-pink-300 hover:text-pink-200">
      ← Back to books
    </a>

    <div class="mt-10 rounded-3xl border border-white/10 bg-white/5 p-8 shadow-2xl">
      <div class="mb-8">
        <p class="mb-3 text-sm font-semibold uppercase tracking-wide text-pink-300">
          CSV Upload
        </p>

        <h1 class="text-4xl font-bold">Import your books</h1>

        <p class="mt-3 text-slate-400">
          Upload a CSV file with book name, author and genre. The books will be processed in the background.
        </p>
      </div>

      <div
        class="flex min-h-64 cursor-pointer flex-col items-center justify-center rounded-2xl border-2 border-dashed border-pink-400/50 bg-slate-900/70 p-10 text-center transition hover:border-pink-300 hover:bg-slate-900"
        (dragover)="onDragOver($event)"
        (drop)="onDrop($event)"
      >
        <div class="mb-4 rounded-full bg-pink-500/10 px-5 py-4 text-4xl">
          📚
        </div>

        <h2 class="text-2xl font-semibold">Drop your CSV file here</h2>

        <p class="mt-2 text-slate-400">
          or select it manually from your computer
        </p>

        <label
          class="mt-6 cursor-pointer rounded-xl bg-pink-500 px-5 py-3 font-semibold text-white shadow-lg shadow-pink-500/30 transition hover:bg-pink-400"
        >
          Choose file
          <input type="file" accept=".csv" class="hidden" (change)="onFileSelected($event)" />
        </label>

        <p *ngIf="file" class="mt-5 rounded-full bg-white/10 px-4 py-2 text-sm text-pink-200">
          Selected: {{ file.name }}
        </p>
      </div>

      <div class="mt-8 flex items-center justify-between">
        <p class="text-sm text-slate-400">
          Expected columns: Name, Author, Genre
        </p>

        <button
          (click)="upload()"
          [disabled]="isUploading"
          class="rounded-xl bg-pink-500 px-6 py-3 font-semibold text-white shadow-lg shadow-pink-500/30 transition hover:bg-pink-400 disabled:cursor-not-allowed disabled:opacity-50"
        >
          {{ isUploading ? 'Uploading...' : 'Upload CSV' }}
        </button>
      </div>
    </div>
  </div>
</div>
