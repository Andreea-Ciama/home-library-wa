<h1>Home Library</h1>

<button (click)="openUploadDialog()">
    Upload CSV
</button>



<h2>Books</h2>

<table border="1">
  <tr>
    <th>Name</th>
    <th>Author</th>
    <th>Genre</th>
    <th>Import Date</th>
  </tr>

  <tr *ngFor="let b of books">
    <td>{{ b.name }}</td>
    <td>{{ b.author }}</td>
    <td>{{ b.genre }}</td>
    <td>{{ b.importDate }}</td>
  </tr>
</table>
